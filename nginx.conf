server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Your frontend static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy for n8n webhooks (and optionally the editor)
    location /webhook/ {
        proxy_pass http://n8n:5678/webhook/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # If you also want to proxy the n8n editor (for development), add:
    # location /n8n/ {
    #     proxy_pass http://n8n:5678/;
    #     proxy_set_header Host $host;
    #     ...
    # }

    # Static assets cache (unchanged)
    location ~* \.(js|css|svg|png|jpg|webp|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
